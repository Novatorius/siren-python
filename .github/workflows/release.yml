name: Release

# Publishes siren-sdk to PyPI when a GitHub Release is published.
#
# Authentication uses PyPI Trusted Publishing (OpenID Connect) — there is no
# API token stored in this repository. Before the first release, configure a
# trusted publisher for the `siren-sdk` project on PyPI:
#
#   PyPI project  -> Settings -> Publishing -> Add a new pending publisher
#     Owner:            Novatorius
#     Repository name:  siren-python
#     Workflow name:    release.yml
#     Environment:      pypi   (must match the `environment:` below; optional but
#                              recommended — remove both if you don't use one)
#
# The `id-token: write` permission is required for Trusted Publishing to work.

on:
  release:
    types: [published]

jobs:
  build-and-publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for PyPI Trusted Publishing (OIDC)

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
